id: slot-effect-potency
game: arcade-demo
type: modifier
name: Увеличение эффективности
summary: Мод слота — усиливает исход умения (урон, лечение, щит и т.д.); в данных разводится по семантике.
body: |
  Вместо одной размытой «эффективности» в коде Gen обычно заводят отдельные ключи: damage_mult, heal_mult и т.п. Запись в каталоге — обобщённый пример типа.
