id: slot-triple-strike
game: gen
type: modifier
name: Шанс тройного удара
summary: Мод слота — шанс тройного срабатывания цепочки; требует явного правила взаимодействия с двойным ударом в бою.
body: |
  В продукте нужно зафиксировать одну модель: независимые проверки, исключения или приоритет (например тройной перекрывает двойной).
