id: slot-cooldown-reduction
game: gen
type: modifier
name: Снижение перезарядки
summary: Встроенный мод слота карты — уменьшает время восстановления умения; сила от уровня модификатора Lm.
body: |
  Тип модификатора для выбора на вехах уровня карты (75, 175, …). Численный множитель задаётся балансом;
  рост значения — по правилам Memento для Lm, независимо от уровня самой карты L.
