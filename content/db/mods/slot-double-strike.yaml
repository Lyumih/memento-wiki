id: slot-double-strike
game: gen
type: modifier
name: Шанс двойного удара
summary: Мод слота — шанс нанести эффект умения дважды за одно срабатывание; значение растёт с Lm.
body: |
  Пример из дизайна: базовый шанс при выборе может удвоиться к Lm = 100 (ориентир баланса, точные цифры — в таблице контента).
